<!DOCTYPE html>
<html lang="en">
    <body style="font-family: Helvetica, Noto Sans, sans-serif; color: rgb(255, 255, 255);">
        <script src="script.js" defer></script>
        <img style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1" src="Background.png" alt="Background image" />
        <div style="display: flex; justify-content: space-between; padding-left: 10px; padding-right: 10px; backdrop-filter: blur(5px) grayscale(100%); background-color: rgba(0, 0, 0, 0.25); color: #fff;">
            <p style="margin-left: 16px; font-weight: 700; background-color: rgba(256, 256, 256, 0.125); padding: 4px 12px; border-radius: 16px; cursor: pointer;" id="welcomeopen">
                PixelOS
            </p>
            <p id="timeElement" style="margin-left: 16px; font-weight: 700; background-color: rgba(256, 256, 256, 0.125); padding: 4px 12px; border-radius: 16px;">
                Time
            </p>
        </div>
        <div id="welcome" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: solid; width: 500px; padding: 8px; background-color: rgba(0, 0, 0, 0.5);">
            <p id="windowheader" style="cursor: grab; margin: 0; padding: 4px; background-color: rgba(255,255,255,0.15); user-select: none; text-align: center;">
                =
            </p>
            <p style="cursor: pointer" id="welcomeclose">Close</p>
            <h1 style="padding: 4px; margin: 4px; background-color: #000; color: #fff">PixelOS</h1>
            <h2>Introduction</h2>
            <p>Welcome to PixelOS!<br>(I refuse to use rounded corners.) This design is simple and intentionally anti-AI.</p>
            <br>
        </div>
    </body>
</html>
