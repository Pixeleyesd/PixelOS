<!DOCTYPE html>
<html lang="en">
    <body>
        <script src="script.js" defer></script>
        <link rel="stylesheet" type="text/css" href="style.css" />
        <img id="background" src="Background.png" alt="Background image" />
        <div id="topBar">
            <p id="welcomeopen">
                PixelOS
            </p>
            <p id="timeElement">
                Time
            </p>
        </div>
        <div id="welcome">
            <div id="welcomewindowtop">
                <div id="welcomeheader">
                    <p id="windowdragger">=</p>
                </div>
                <div id="welcomeclose"></div>
            </div>
            <h1 id="coolname">PixelOS</h1>
            <h2>Introduction</h2>
            <p>Welcome to PixelOS!<br>(I refuse to use rounded corners.) This design is simple and intentionally anti-AI.</p>
            <br>
        </div>
        <div id="desktopApps" style="padding-top: 16px; cursor: default;">
            <div style="text-align: center; padding: 16px; width: fit-content">
                <img src="NotesApp.png" style="width: 64px; height: 64px; cursor: pointer;" id="notesicon" class="notesicon" />
                <p style="margin: 0px; color: #fff; ">PixelNotes</p>
            </div>
        </div>
        <div id="notesAppOpen" style="display: none;">
            <div id="noteswindowtop">
                <div id="notesAppOpenheader">
                    <p id="noteswindowdragger">=</p>
                </div>
                <div id="notesclose"></div>
            </div>
            <h1 id="notescoolname">PixelNotes</h1>
            <p>Welcome to PixelNotes! A simple note-taking app for PixelOS :)<br></p>
            <p style="display: block;">
                <label for="noteTitle">Note Title:</label>
                <input type="text" id="noteTitle" placeholder="Note Title" style="width:730px;">
                
                <label for="noteContent">Note Content:</label>
                <textarea id="noteContent" placeholder="Write your note here..." style="width:730px;"></textarea>
                
                <button id="saveBtn">Save Note</button>
            </p>
        </div>
    </body>
</html>
